services:
  - type: web
    name: deepcite-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: EMBEDDING_MODEL
        value: models/embedding-001
      - key: PYTHON_VERSION
        value: "3.11"
